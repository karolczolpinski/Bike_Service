<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Serwis rowerowy{% endblock %}</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
            color: #1f2937;
        }

        header {
            background: #1f2937;
            color: white;
            padding: 20px 40px;
        }

        header h1 {
            margin: 0 0 15px 0;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 18px;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        main {
            max-width: 1000px;
            margin: 30px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
        }

        footer {
            text-align: center;
            background: #1f2937;
            color: white;
            padding: 16px;
            margin-top: 40px;
        }

        h2 {
            margin-top: 0;
            color: #111827;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th {
            background: #eef2ff;
            color: #1f2937;
            text-align: left;
            padding: 12px;
            border-bottom: 2px solid #d1d5db;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }

        tr:hover {
            background: #f9fafb;
        }

        .stats {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .card {
            flex: 1 1 180px;
            background: #eef2ff;
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #4f46e5;
        }

        .card h3 {
            margin-top: 0;
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 999px;
            background: #e0e7ff;
            color: #3730a3;
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Your best bike service system</h1>
            <nav>
                <a href="{% url 'home' %}">Strona główna</a> |
                <a href="{% url 'rowery' %}">Rowery</a> |
                <a href="{% url 'zgloszenia' %}">Zgłoszenia</a> |
                <a href="{% url 'czesci' %}">Części</a>
            </nav>
        <hr>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        CCP-bike service
    </footer>
</body>
</html>
