{% extends "base.html" %}

{% block title %}Części{% endblock %}

{% block content %}
<h2>Magazyn części</h2>

<table>
    <tr>
        <th>Nazwa</th>
        <th>Stan</th>
        <th>Cena</th>
    </tr>

    {% for czesc in czesci %}
    <tr>
        <td>{{ czesc.nazwa }}</td>
        <td>{{ czesc.stan_magazynowy }}</td>
        <td>{{ czesc.cena }} zł</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="3">Brak części</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
